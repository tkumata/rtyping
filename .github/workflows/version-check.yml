name: バージョン確認とリリース

on:
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.version-check.outputs.changed }}
      new-version: ${{ steps.version-check.outputs.version }}
      previous-version: ${{ steps.version-check.outputs.previous-version }}

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rust ツールチェーンを設定
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: バージョン変更を確認
        id: version-check
        run: |
          CURRENT_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "rtyping") | .version')
          echo "現在のバージョン: $CURRENT_VERSION"

          PREVIOUS_VERSION=$(git show HEAD~1:Cargo.toml 2>/dev/null | grep -E '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/' || echo "0.0.0")
          echo "前回のバージョン: $PREVIOUS_VERSION"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "バージョン変更あり: $PREVIOUS_VERSION -> $CURRENT_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "previous-version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT
          else
            echo "バージョン変更なし"
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "previous-version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT
          fi

  test:
    name: リリース前検証
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Rust ツールチェーンを設定
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cargo レジストリをキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cargo Git をキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: target をキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Linux 依存ライブラリを導入
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev

      - name: check を実行
        run: make check

      - name: build を実行
        run: make build

  build:
    name: リリースビルド (${{ matrix.target }})
    needs:
      - check-version
      - test
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_deps: |
              sudo apt-get update
              sudo apt-get install -y pkg-config libasound2-dev libudev-dev

          - os: macos-latest
            target: aarch64-apple-darwin
            build_deps: ""

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Rust ツールチェーンを設定
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cargo レジストリをキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cargo Git をキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: target をキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-target-

      - name: ビルド依存ライブラリを導入
        if: matrix.build_deps != ''
        run: ${{ matrix.build_deps }}

      - name: リリースビルドを実行
        run: cargo build --release --target ${{ matrix.target }}

      - name: 成果物を準備
        run: |
          mkdir -p dist
          artifact_name="rtyping-v${{ needs.check-version.outputs.new-version }}-${{ matrix.target }}"
          cp target/${{ matrix.target }}/release/rtyping "dist/${artifact_name}"
          chmod +x "dist/${artifact_name}"

      - name: 成果物をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: rtyping-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: GitHub Release を作成
    needs:
      - check-version
      - build
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 成果物を取得
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: リリースノートを生成
        run: |
          version="${{ needs.check-version.outputs.new-version }}"
          previous_version="${{ needs.check-version.outputs.previous-version }}"
          current_tag="v${version}"
          previous_tag="v${previous_version}"
          log_target="HEAD"

          if git rev-parse -q --verify "refs/tags/${previous_tag}" >/dev/null; then
            log_target="${previous_tag}..HEAD"
          fi

          git log --no-merges --pretty=format:'- %s (%h)' "$log_target" > release-commits.md

          {
            echo "# rtyping ${current_tag}"
            echo
            echo "## Summary"
            echo
            echo "- Version: \`${version}\`"
            echo "- Previous version: \`${previous_version}\`"
            echo "- Source of truth: \`Cargo.toml\`"
            echo
            echo "## Changes"
            echo
            if [ -s release-commits.md ]; then
              cat release-commits.md
              echo
            else
              echo "- Version metadata update."
            fi
            echo
            echo "## Assets"
            echo
            find dist -maxdepth 1 -type f | sort | while read -r file; do
              printf -- '- `%s`\n' "$(basename "$file")"
            done
          } > RELEASE_NOTES.md

      - name: リリースを作成
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.new-version }}
          name: リリース v${{ needs.check-version.outputs.new-version }}
          draft: false
          prerelease: false
          body_path: RELEASE_NOTES.md
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
