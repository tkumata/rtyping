name: バージョン確認とリリース

on:
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.version-check.outputs.changed }}
      new-version: ${{ steps.version-check.outputs.version }}

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: バージョン変更を確認
        id: version-check
        run: |
          # 現在のバージョンを取得
          CURRENT_VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "現在のバージョン: $CURRENT_VERSION"

          # 直前コミットのバージョンを取得
          git checkout HEAD~1 -- Cargo.toml 2>/dev/null || echo "初回コミット"
          PREVIOUS_VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/' || echo "0.0.0")
          echo "前回のバージョン: $PREVIOUS_VERSION"

          # 現在の Cargo.toml に戻す
          git checkout HEAD -- Cargo.toml

          # バージョン差分を判定
          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "バージョン変更あり: $PREVIOUS_VERSION -> $CURRENT_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "バージョン変更なし"
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi

  test:
    name: リリース前テスト
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Rust ツールチェーンを設定
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cargo レジストリをキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cargo Git をキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: target をキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Linux 依存ライブラリを導入
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev

      - name: テストを実行
        run: cargo test

  build-and-release:
    needs:
      - check-version
      - test
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rtyping-x86_64-linux
            build_deps: |
              sudo apt-get update
              sudo apt-get install -y pkg-config libasound2-dev libudev-dev

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rtyping-aarch64-macos
            build_deps: ""

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Rust ツールチェーンを設定
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cargo レジストリをキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cargo Git をキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: target をキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-target-

      - name: ビルド依存ライブラリを導入
        if: matrix.build_deps != ''
        run: ${{ matrix.build_deps }}

      - name: リリースビルドを実行
        run: cargo build --release --target ${{ matrix.target }}

      - name: 成果物を準備
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rtyping dist/${{ matrix.artifact_name }}
          chmod +x dist/${{ matrix.artifact_name }}

      - name: リリースを作成
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.new-version }}
          name: リリース v${{ needs.check-version.outputs.new-version }}
          draft: false
          prerelease: false
          files: dist/${{ matrix.artifact_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
