name: 自動テスト

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  cargo-test:
    name: テスト実行 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Rust ツールチェーンを設定
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cargo レジストリをキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cargo Git をキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: target をキャッシュ
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Linux 依存ライブラリを導入
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev

      - name: テストを実行
        run: cargo test
